<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 40px 20px;
        }
    </style>
</head>
<body>

    <h1>AI News Analyzer Dashboard</h1>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search news">
        <button id="search" >Search</button>
    </div>


    <div class="categories">
        <button onclick="details('technology')">Tech</button>
        <button onclick="details('business')">Business</button>
        <button onclick="details('sports')">Sports</button>
        <button onclick="details('health')">Health</button>
    </div>
    <div id="newsContainer"></div>

    <script src="news.js"></script>
</body>
</html>
